<!DOCTYPE html>

    <meta name="description" content="Felix Hub - –§–æ—Ä–º–∞ –∑–∞–∫–∞–∑–∞ –∑–∞–ø—á–∞—Å—Ç–µ–π">
    <meta name="theme-color" content="#667eea">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .header h1 {
            color: #333;
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .header .subtitle {
            color: #666;
            font-size: 1.1em;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 1.05em;
        }
        
        .form-group input[type="text"],
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        
        .form-group select {
            -webkit-appearance: menulist;
            appearance: menulist;
            background-color: white;
            cursor: pointer;
        }
        
        .form-group input[type="text"]:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
            gap: 10px;
        }
        
        .checkbox-item:hover {
            background: #e9ecef;
        }
        
        .checkbox-item.checked {
            background: #e7f1ff;
            border-color: #667eea;
        }
        
        .checkbox-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            min-width: 20px;
            cursor: pointer;
            flex-shrink: 0;
            accent-color: #667eea;
            -webkit-appearance: checkbox;
            appearance: checkbox;
        }
        
        .checkbox-item .part-name {
            flex: 1;
        }
        
        .checkbox-item .quantity-control {
            display: none;
            align-items: center;
            gap: 8px;
        }
        
        .checkbox-item.checked .quantity-control {
            display: flex;
        }
        
        /* –ü–µ—Ä–µ–∫–ª—é—á–∞—Ç–µ–ª—å –æ—Ä–∏–≥–∏–Ω–∞–ª/–∞–Ω–∞–ª–æ–≥ –¥–ª—è –∫–∞–∂–¥–æ–π –¥–µ—Ç–∞–ª–∏ */
        .checkbox-item .part-type-toggle {
            display: none;
            gap: 4px;
            margin-left: 8px;
        }
        
        .checkbox-item.checked .part-type-toggle {
            display: flex;
        }
        
        .part-type-toggle .type-btn {
            padding: 4px 8px;
            font-size: 11px;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            background: #f8f9fa;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .part-type-toggle .type-btn:hover {
            border-color: #667eea;
        }
        
        .part-type-toggle .type-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .part-type-toggle .type-btn.original.active {
            background: #10b981;
            border-color: #10b981;
        }
        
        .part-type-toggle .type-btn.analog.active {
            background: #f59e0b;
            border-color: #f59e0b;
        }
        
        .quantity-control label {
            font-size: 13px;
            color: #666;
            margin: 0;
            font-weight: normal;
        }
        
        .quantity-control input[type="number"] {
            width: 60px;
            padding: 6px 8px;
            border: 2px solid #667eea;
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
            font-weight: 600;
        }
        
        .quantity-control input[type="number"]:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        
        .custom-parts {
            margin-top: 15px;
        }
        
        .custom-parts-input {
            display: flex;
            gap: 10px;
        }
        
        .custom-parts-input input {
            flex: 1;
        }
        
        .add-btn {
            padding: 14px 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .add-btn:hover {
            background: #218838;
            transform: translateY(-2px);
        }
        
        .custom-parts-list {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .custom-part-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #667eea;
            color: white;
            border-radius: 20px;
            font-size: 0.9em;
        }
        
        .custom-part-tag button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 1.2em;
            padding: 0;
            line-height: 1;
        }
        
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        
        .radio-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .radio-item input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .radio-item label {
            margin: 0;
            cursor: pointer;
            font-weight: normal;
        }
        
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .submit-btn:active {
            transform: translateY(-1px);
        }
        
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: #f0f0f0;
            color: #333;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: #e0e0e0;
        }
        
        .success-message,
        .error-message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        .success-message {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .error-message {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .hidden {
            display: none;
        }
        
        .parts-counter {
            font-size: 0.9em;
            color: #666;
            margin-top: 10px;
        }
        
        @media (max-width: 480px) {

            }
            
            /* –§–∏–∫—Å–∏—Ä—É–µ–º –ø—Ä–æ–∫—Ä—É—Ç–∫—É –¥–ª—è select –Ω–∞ –º–æ–±–∏–ª—å–Ω—ã—Ö —É—Å—Ç—Ä–æ–π—Å—Ç–≤–∞—Ö */

                -webkit-appearance: menulist-button; /* –ù–∞—Ç–∏–≤–Ω—ã–π –≤–∏–¥ –¥–ª—è iOS */
                appearance: menulist-button;
            }
            
            /* –î–ª—è Android */
            .form-group select option {
                font-size: 16px;
            }
        }
    </style>
</head>

        document.getElementById('submitBtn').textContent = t.submitBtn;
        document.getElementById('addCustomBtn').textContent = t.addCustomBtn;
        
        // –ö–∞—Ç–∞–ª–æ–≥ –∑–∞–ø—á–∞—Å—Ç–µ–π
        const catalog = {{ catalog | tojson }};
        
        // –í—ã–±—Ä–∞–Ω–Ω—ã–µ –¥–µ—Ç–∞–ª–∏ - —Å–æ—Ö—Ä–∞–Ω—è–µ–º —Å –∫–æ–ª–∏—á–µ—Å—Ç–≤–æ–º –∏ ID
        let selectedParts = {}; // –§–æ—Ä–º–∞—Ç: { 'id_–∏–ª–∏_name': { name: '–Ω–∞–∑–≤–∞–Ω–∏–µ', quantity: —á–∏—Å–ª–æ, part_id: id } }
        let customParts = [];
        
        // –û–±—Ä–∞–±–æ—Ç—á–∏–∫ –≤—ã–±–æ—Ä–∞ –∫–∞—Ç–µ–≥–æ—Ä–∏–∏
        document.getElementById('category').addEventListener('change', function() {
            const category = this.value;
            const partsGroup = document.getElementById('partsGroup');
            const partsList = document.getElementById('partsList');
            
            if (category && catalog[category]) {
                partsGroup.style.display = 'block';
                partsList.innerHTML = '';
                
                catalog[category].forEach(part => {
                    const div = document.createElement('div');
                    div.className = 'checkbox-item';
                    
                    // –ü–æ–¥–¥–µ—Ä–∂–∫–∞ –Ω–æ–≤–æ–≥–æ —Ñ–æ—Ä–º–∞—Ç–∞ (–æ–±—ä–µ–∫—Ç —Å id –∏ name) –∏ —Å—Ç–∞—Ä–æ–≥–æ (–ø—Ä–æ—Å—Ç–æ —Å—Ç—Ä–æ–∫–∞)
                    const partId = typeof part === 'object' ? part.id : null;
                    const partName = typeof part === 'object' ? part.name : part;
                    const partKey = partId || partName; // –ö–ª—é—á –¥–ª—è selectedParts
                    
                    // –ü—Ä–æ–≤–µ—Ä—è–µ–º, –±—ã–ª–∞ –ª–∏ —ç—Ç–∞ –¥–µ—Ç–∞–ª—å —É–∂–µ –≤—ã–±—Ä–∞–Ω–∞
                    const isChecked = selectedParts.hasOwnProperty(partKey);
                    const quantity = isChecked ? selectedParts[partKey].quantity : 1;
                    
                    if (isChecked) {
                        div.classList.add('checked');
                    }
                    
                    const safeId = 'part_' + partName.replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_]/g, '');
                    
                    // –ü–æ–ª—É—á–∞–µ–º –≥–ª–æ–±–∞–ª—å–Ω–æ–µ –∑–Ω–∞—á–µ–Ω–∏–µ is_original
                    const globalIsOriginal = document.getElementById('typeOriginal').checked;
                    const partIsOriginal = isChecked && selectedParts[partKey].hasOwnProperty('is_original') 
                        ? selectedParts[partKey].is_original 
                        : globalIsOriginal;
                    
                    div.innerHTML = `
                        <input type="checkbox" 
                               id="${safeId}" 
                               value="${partName}" 
                               data-part-id="${partId || ''}"
                               ${isChecked ? 'checked' : ''}>
                        <span class="part-name">${partName}</span>
                        <div class="part-type-toggle">
                            <span class="type-btn original ${partIsOriginal ? 'active' : ''}" 
                                  onclick="event.stopPropagation(); event.preventDefault(); setPartType(this, true)">üíé ${t.labelOriginal || '–û—Ä–∏–≥'}</span>
                            <span class="type-btn analog ${!partIsOriginal ? 'active' : ''}" 
                                  onclick="event.stopPropagation(); event.preventDefault(); setPartType(this, false)">üîÑ ${t.labelAnalog || '–ê–Ω–∞–ª–æ–≥'}</span>
                        </div>
                        <div class="quantity-control">
                            <label>${t.quantityLabel || '–ö–æ–ª-–≤–æ'}:</label>
                            <input type="number" 
                                   min="1" 
                                   max="999" 
                                   value="${quantity}"
                                   class="part-quantity"
                                   onclick="event.stopPropagation()">
                        </div>
                    `;
                    partsList.appendChild(div);
                    
                    // –û–±—Ä–∞–±–æ—Ç—á–∏–∫ –∏–∑–º–µ–Ω–µ–Ω–∏—è —á–µ–∫–±–æ–∫—Å–∞
                    const checkbox = div.querySelector('input[type="checkbox"]');
                    const quantityInput = div.querySelector('.part-quantity');
                    
                    checkbox.addEventListener('change', function() {
                        const partId = this.getAttribute('data-part-id');
                        const partKey = partId || this.value;
                        
                        // –ü–µ—Ä–µ–∫–ª—é—á–∞–µ–º –∫–ª–∞—Å—Å checked –Ω–∞ —Ä–æ–¥–∏—Ç–µ–ª—å—Å–∫–æ–º div
                        if (this.checked) {
                            div.classList.add('checked');
                            // –ü–æ–ª—É—á–∞–µ–º is_original –∏–∑ –ø–µ—Ä–µ–∫–ª—é—á–∞—Ç–µ–ª—è –¥–µ—Ç–∞–ª–∏ –∏–ª–∏ –≥–ª–æ–±–∞–ª—å–Ω–æ–≥–æ
                            const typeToggle = div.querySelector('.part-type-toggle');
                            const isOriginal = typeToggle.querySelector('.type-btn.original').classList.contains('active');
                            
                            selectedParts[partKey] = {
                                name: this.value,
                                quantity: parseInt(quantityInput.value) || 1,
                                part_id: partId ? parseInt(partId) : null,
                                is_original: isOriginal
                            };
                        } else {
                            div.classList.remove('checked');
                            delete selectedParts[partKey];
                        }
                        updateSelectedParts();
                    });
                    
                    // –û–±—Ä–∞–±–æ—Ç—á–∏–∫ –∏–∑–º–µ–Ω–µ–Ω–∏—è –∫–æ–ª–∏—á–µ—Å—Ç–≤–∞
                    quantityInput.addEventListener('change', function(e) {
                        e.stopPropagation();
                        if (checkbox.checked) {
                            const qty = parseInt(this.value) || 1;
                            this.value = Math.max(1, Math.min(999, qty));
                            const partId = checkbox.getAttribute('data-part-id');
                            const partKey = partId || checkbox.value;
                            if (selectedParts[partKey]) {
                                selectedParts[partKey].quantity = parseInt(this.value);
                            }
                        }
                    });
                });
            } else {
                partsGroup.style.display = 'none';
                partsList.innerHTML = '';
            }
            
            updateSelectedParts();
        });
        
        // –û–±–Ω–æ–≤–ª–µ–Ω–∏–µ —Å–ø–∏—Å–∫–∞ –≤—ã–±—Ä–∞–Ω–Ω—ã—Ö –¥–µ—Ç–∞–ª–µ–π
        function updateSelectedParts() {
            const total = Object.keys(selectedParts).length + customParts.length;
            document.getElementById('partsCounter').textContent = t.partsCounter + total;
        }
        
        // –£—Å—Ç–∞–Ω–æ–≤–∫–∞ —Ç–∏–ø–∞ –¥–µ—Ç–∞–ª–∏ (–æ—Ä–∏–≥–∏–Ω–∞–ª/–∞–Ω–∞–ª–æ–≥) –¥–ª—è –∫–æ–Ω–∫—Ä–µ—Ç–Ω–æ–π –ø–æ–∑–∏—Ü–∏–∏
        function setPartType(btn, isOriginal) {
            const toggle = btn.closest('.part-type-toggle');
            const item = btn.closest('.checkbox-item');
            const checkbox = item.querySelector('input[type="checkbox"]');
            
            // –û–±–Ω–æ–≤–ª—è–µ–º UI
            toggle.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            // –û–±–Ω–æ–≤–ª—è–µ–º –¥–∞–Ω–Ω—ã–µ –µ—Å–ª–∏ –¥–µ—Ç–∞–ª—å –≤—ã–±—Ä–∞–Ω–∞
            if (checkbox && checkbox.checked) {
                const partId = checkbox.getAttribute('data-part-id');
                const partKey = partId || checkbox.value;
                if (selectedParts[partKey]) {
                    selectedParts[partKey].is_original = isOriginal;
                }
            }
        }
        
        // –ü—Ä–∏–º–µ–Ω–µ–Ω–∏–µ –≥–ª–æ–±–∞–ª—å–Ω–æ–≥–æ —Ç–∏–ø–∞ –∫–æ –≤—Å–µ–º –¥–µ—Ç–∞–ª—è–º –ø—Ä–∏ –∏–∑–º–µ–Ω–µ–Ω–∏–∏ —Ä–∞–¥–∏–æ-–∫–Ω–æ–ø–æ–∫
        document.querySelectorAll('input[name="partType"]').forEach(radio => {
            radio.addEventListener('change', function() {
                const isOriginal = document.getElementById('typeOriginal').checked;
                
                // –û–±–Ω–æ–≤–ª—è–µ–º –≤—Å–µ –≤–∏–¥–∏–º—ã–µ –ø–µ—Ä–µ–∫–ª—é—á–∞—Ç–µ–ª–∏
                document.querySelectorAll('.part-type-toggle').forEach(toggle => {
                    toggle.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
                    if (isOriginal) {
                        toggle.querySelector('.type-btn.original').classList.add('active');
                    } else {
                        toggle.querySelector('.type-btn.analog').classList.add('active');
                    }
                });
                
                // –û–±–Ω–æ–≤–ª—è–µ–º –≤—Å–µ –≤—ã–±—Ä–∞–Ω–Ω—ã–µ –¥–µ—Ç–∞–ª–∏ –≤ selectedParts
                for (const key in selectedParts) {
                    selectedParts[key].is_original = isOriginal;
                }
            });
        });
        
        // –î–æ–±–∞–≤–ª–µ–Ω–∏–µ –∫–∞—Å—Ç–æ–º–Ω–æ–π –¥–µ—Ç–∞–ª–∏
        document.getElementById('addCustomBtn').addEventListener('click', function() {
            const input = document.getElementById('customPart');
            const value = input.value.trim();
            
            if (value && !customParts.includes(value)) {
                customParts.push(value);
                
                const tag = document.createElement('div');
                tag.className = 'custom-part-tag';
                tag.innerHTML = `
                    <span>${value}</span>
                    <button type="button" onclick="removeCustomPart('${value}')">√ó</button>
                `;
                
                document.getElementById('customPartsList').appendChild(tag);
                input.value = '';
                updateSelectedParts();
            }
        });
        
        // –£–¥–∞–ª–µ–Ω–∏–µ –∫–∞—Å—Ç–æ–º–Ω–æ–π –¥–µ—Ç–∞–ª–∏
        function removeCustomPart(part) {
            customParts = customParts.filter(p => p !== part);
            
            const tags = document.querySelectorAll('.custom-part-tag');
            tags.forEach(tag => {
                if (tag.textContent.includes(part)) {
                    tag.remove();
                }
            });
            
            updateSelectedParts();
        }
        
        // –û—Ç–ø—Ä–∞–≤–∫–∞ —Ñ–æ—Ä–º—ã
        document.getElementById('orderForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const mechanicName = document.getElementById('mechanicName').value.trim();
            const telegramId = document.getElementById('telegramId').value.trim();
            const plateNumber = document.getElementById('plateNumber').value.trim();
            const category = document.getElementById('category').value;
            const isOriginal = document.getElementById('typeOriginal').checked;
            const comment = document.getElementById('comment').value.trim();
            
            // –í–∞–ª–∏–¥–∞—Ü–∏—è
            if (!plateNumber || plateNumber.length < 5) {
                showError(t.errorPlate);
                return;
            }
            
                        // –§–æ—Ä–º–∏—Ä—É–µ–º —Å–ø–∏—Å–æ–∫ –¥–µ—Ç–∞–ª–µ–π —Å –∫–æ–ª–∏—á–µ—Å—Ç–≤–æ–º –∏ ID
            const allParts = [];
            
            // –î–æ–±–∞–≤–ª—è–µ–º –≤—ã–±—Ä–∞–Ω–Ω—ã–µ –¥–µ—Ç–∞–ª–∏ –∏–∑ –∫–∞—Ç–∞–ª–æ–≥–∞
            for (const key in selectedParts) {
                const part = selectedParts[key];
                const partData = {
                    name: part.name,
                    quantity: part.quantity,
                    is_original: part.is_original !== undefined ? part.is_original : isOriginal
                };
                
                // –ï—Å–ª–∏ –µ—Å—Ç—å part_id, –¥–æ–±–∞–≤–ª—è–µ–º –µ–≥–æ –¥–ª—è –ø–µ—Ä–µ–≤–æ–¥–∞
                if (part.part_id) {
                    partData.part_id = part.part_id;
                }
                
                allParts.push(partData);
            }
            
            // –î–æ–±–∞–≤–ª—è–µ–º –∫–∞—Å—Ç–æ–º–Ω—ã–µ –¥–µ—Ç–∞–ª–∏ (–±–µ–∑ ID, –ø–æ —É–º–æ–ª—á–∞–Ω–∏—é –∫–æ–ª–∏—á–µ—Å—Ç–≤–æ 1, –±–µ—Ä—ë–º –≥–ª–æ–±–∞–ª—å–Ω—ã–π is_original)
            customParts.forEach(part => {
                allParts.push({
                    name: part,
                    quantity: 1,
                    is_original: isOriginal
                });
            });
            
            if (allParts.length === 0) {
                showError(t.errorParts);
                return;
            }
            
            // –û—Ç–∫–ª—é—á–∞–µ–º –∫–Ω–æ–ø–∫—É
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '‚è≥ –û—Ç–ø—Ä–∞–≤–∫–∞...';
            
            try {
                const response = await fetch('/api/submit_order', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        mechanic_name: mechanicName,
                        telegram_id: telegramId || null,
                        plate_number: plateNumber,
                        category: category,
                        selected_parts: allParts,
                        is_original: isOriginal,
                        comment: comment || null
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showSuccess(t.successMessage + data.order_id);
                    
                    // –û—á–∏—Å—Ç–∫–∞ —Ñ–æ—Ä–º—ã
                    setTimeout(() => {
                        document.getElementById('orderForm').reset();
                        selectedParts = [];
                        customParts = [];
                        document.getElementById('partsGroup').style.display = 'none';
                        document.getElementById('customPartsList').innerHTML = '';
                        updateSelectedParts();
                        submitBtn.disabled = false;
                        submitBtn.textContent = t.submitBtn;
                    }, 2000);
                } else {
                    showError(t.errorSubmit + (data.error || 'Unknown error'));
                    submitBtn.disabled = false;
                    submitBtn.textContent = t.submitBtn;
                }
            } catch (error) {
                showError(t.errorSubmit + error.message);
                submitBtn.disabled = false;
                submitBtn.textContent = t.submitBtn;
            }
        });
        
        // –ü–æ–∫–∞–∑ —Å–æ–æ–±—â–µ–Ω–∏–π
        function showSuccess(message) {
            const el = document.getElementById('successMessage');
            el.textContent = message;
            el.classList.remove('hidden');
            document.getElementById('errorMessage').classList.add('hidden');
            
            setTimeout(() => {
                el.classList.add('hidden');
            }, 5000);
        }
        
        function showError(message) {
            const el = document.getElementById('errorMessage');
            el.textContent = message;
            el.classList.remove('hidden');
            document.getElementById('successMessage').classList.add('hidden');
        }
    </script>
    <script src="{{ url_for('static', filename='js/mobile-enhancements.js') }}"></script>
